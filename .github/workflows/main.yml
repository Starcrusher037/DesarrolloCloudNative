name: Build and Push Docker Image
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
      
jobs: 
  build:
    runs-on: ubuntu-latest 
    steps:

      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

    # Paso 1.5: Configurar Java y Compilar el JAR con Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Aseguramos permisos por si acaso en el runner
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # Forzamos a saltar la compilación de pruebas de forma absoluta
      - name: Build with Maven (Saltando inicialización de BD)
        run: ./mvnw package -Dmaven.test.skip=true -DfailIfNoTests=false
        
      # Paso 2: Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen de Docker (¡Limpia de Secretos!)
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      # Paso 4: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          
      # Paso 5: Configurar credenciales de AWS
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Paso 5.5: Configurar clave SSH privada temporalmente en el Runner
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 6: Conectarse a EC2 y desplegar (Se remueven comillas de EOF para resolver secretos)
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << EOF
            # Autenticar en DockerHub desde EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            # Descargar la última versión de la imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            
            # Preparar la Oracle Wallet en el servidor de destino
            mkdir -p ~/oracle_wallet
            echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 --decode > ~/oracle_wallet/wallet.zip
            unzip -j -o ~/oracle_wallet/wallet.zip -d ~/oracle_wallet/
            sed -i 's|"?/network/admin"|"/app/wallet"|g' ~/oracle_wallet/sqlnet.ora
            rm -f ~/oracle_wallet/wallet.zip
            
            # Parar y eliminar cualquier contenedor previo de forma segura
            docker stop my-app || true
            docker rm my-app || true
            
            # Iniciar el contenedor inyectando variables de entorno seguras en tiempo de ejecución
            docker run -d --name my-app -p 8080:8080 \
              -v ~/oracle_wallet:/app/wallet \
              -e ORACLE_TNS_NAME="${{ secrets.ORACLE_TNS_NAME }}" \
              -e ORACLE_DB_USER="${{ secrets.ORACLE_DB_USER }}" \
              -e ORACLE_DB_PASSWORD="${{ secrets.ORACLE_DB_PASSWORD }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          EOF